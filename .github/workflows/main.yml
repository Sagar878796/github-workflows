import requests

url = "http://filex.me:8080/player_api.php?username=000003&password=000003&action=get_live_streams"
data = requests.get(url).json()

m3u = "#EXTM3U\n"

for ch in data:
    name = ch["name"]
    stream_id = ch["stream_id"]
    m3u += f'#EXTINF:-1,{name}\n'
    m3u += f'http://filex.me:8080/live/000003/000003/{stream_id}.ts\n'

open("playlist.m3u", "w").write(m3u)

print("Done ✅")
