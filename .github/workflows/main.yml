name: Auto M3U Update

on:
  schedule:
    - cron: "0 */4 * * *"
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest

    permissions:
      contents: write

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Generate M3U
        run: |
          curl "https://local.07live.workers.dev/playlist.m3u?user=gana-sunega&pass=krish-ka" -o playlist.m3u

      - name: Commit & Push
        run: |
          git config --global user.name "bot"
          git config --global user.email "bot@example.com"
          git add playlist.m3u
          git commit -m "Update playlist" || echo "No changes"
          git push
