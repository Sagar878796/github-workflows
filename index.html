<!DOCTYPE html>
<html>
<head>
  <title>M3U Player</title>
</head>
<body>

<h2>Channel List</h2>
<ul id="list"></ul>

<script>
fetch("./min.m3u")
  .then(res => res.text())
  .then(text => {
    const lines = text.split("\n");
    let list = document.getElementById("list");

    for (let i = 0; i < lines.length; i++) {
      if (lines[i].startsWith("#EXTINF")) {
        let name = lines[i].split(",")[1];
        let url = lines[i + 1];

        let li = document.createElement("li");
        li.innerHTML = `<a href="${url}" target="_blank">${name}</a>`;
        list.appendChild(li);
      }
    }
  });
</script>

</body>
</html>
